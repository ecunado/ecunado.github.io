<?xml version="1.0" encoding="UTF-8"?>
<!--
  Clicklist favicon — transparent background, ring + glow only.
  Uses SVG filters (browsers support them, unlike librsvg).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <filter id="f-wide" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="32"/>
    </filter>
    <filter id="f-mid" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
    <filter id="f-tight" x="-16%" y="-16%" width="132%" height="132%">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
    <filter id="f-ring" x="-8%" y="-8%" width="116%" height="116%">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <!-- Atmospheric bloom -->
  <circle cx="256" cy="256" r="173"
    fill="none" stroke="#FF3D00" stroke-width="90"
    opacity="0.04" filter="url(#f-wide)"/>

  <!-- Corona -->
  <circle cx="256" cy="256" r="173"
    fill="none" stroke="#FF1A6B" stroke-width="44"
    opacity="0.18" filter="url(#f-mid)"/>

  <!-- Penumbra -->
  <circle cx="256" cy="256" r="173"
    fill="none" stroke="#FF1A6B" stroke-width="18"
    opacity="0.55" filter="url(#f-tight)"/>

  <!-- Immediate glow -->
  <circle cx="256" cy="256" r="173"
    fill="none" stroke="#FF4488" stroke-width="7"
    opacity="0.80" filter="url(#f-ring)"/>

  <!-- Crisp ring -->
  <circle cx="256" cy="256" r="173"
    fill="none" stroke="#FFD0E4" stroke-width="2" opacity="0.95"/>

</svg>
